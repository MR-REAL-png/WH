<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Gudang — Kelola Rak</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B5FA8">
</head>
<body>

<header class="topbar">
  <span class="topbar__eyebrow">Gudang · Lokasi</span>
  <h1 class="topbar__title">Kelola Lokasi Rak</h1>
</header>

<main class="container">
  <div class="field">
    <label>Kode rak</label>
    <div style="display:flex; gap:8px;">
      <input type="text" id="rakInput" class="mono" placeholder="mis. R1-A2" autocomplete="off" style="flex:1; padding:12px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:15px; background:var(--surface-alt);">
      <button class="btn btn--primary" id="scanBtn"><span id="scanIconSlot"></span>Scan</button>
    </div>
    <p class="text-muted" style="font-size:12px; margin-top:6px;">Ketik manual, atau pakai scanner fisik PDA / kamera — hasil scan otomatis masuk ke field ini.</p>
  </div>

  <div id="rakTargetArea"></div>

  <div id="assignArea" style="display:none; margin-top:18px;">
    <span class="section-label">Barang di rak ini</span>
    <div class="item-list" id="rakItemList"></div>

    <button class="btn btn--secondary btn--block" id="addToRakBtn" style="margin-top:12px;">+ Tambah barang ke rak ini</button>
  </div>
</main>

<!-- Sheet: cari & pilih barang untuk di-assign -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="assignSheet">
  <div class="sheet__handle"></div>
  <div style="padding-bottom:8px;">
    <h3 style="font-size:16px; margin-bottom:12px;">Pilih barang</h3>
    <div class="search-bar" style="margin-bottom:12px;">
      <span id="assignSearchIconSlot"></span>
      <input type="text" id="assignSearchInput" placeholder="Cari nama atau part number…" autocomplete="off">
    </div>
    <div class="item-list" id="assignResultList" style="max-height:50vh; overflow-y:auto;"></div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script src="js/rak.js"></script>
<!-- Dimuat paling akhir, non-blocking — cuma dipakai kalau tombol kamera fallback ditekan. -->
<script src="js/vendor/html5-qrcode.min.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
  }
</script>
</body>
</html>
